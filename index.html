<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>VULCAN | FRESH STREAM</title>
    <style>
        :root { --bg: #1e2025; --panel: #282a30; --text: #ffffff; --green: #00c389; --blue: #4285f4; --grey: #8a8d9a; --border: #4a4d55; --danger: #ff4d4d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        body { background: #121214; color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #mod-menu {
            width: 100%; max-width: 450px; height: 100%; max-height: 95vh;
            background: var(--bg); border-radius: 16px; padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: relative; display: flex; flex-direction: column;
        }

        .logo-header { text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo-header h1 { font-size: 22px; text-transform: uppercase; letter-spacing: 2px; color: #a5f3e0; margin: 0; }

        /* The Blue/Green Gmail Style Logo */
        .gmail-logo { width: 32px; height: 32px; }

        .address-section { border: 2px dashed var(--border); border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; text-align: center; }
        #addr-box { background: #000; border-radius: 50px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border: 1px solid var(--blue); }
        #addr-display { font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .v-btn { border: none; border-radius: 50px; padding: 16px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .change-btn { background: var(--blue); color: #fff; }
        .copy-btn { background: var(--green); color: #fff; }
        .save-btn { background: #3d4048; color: #fff; width: 100%; border: 1px solid var(--border); }
        
        #inbox-bar { background: var(--panel); border-radius: 50px; padding: 18px 30px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-top: 10px; border-left: 4px solid var(--blue); }
        .inbox-count { background: var(--green); border-radius: 50px; padding: 3px 12px; font-size: 13px; color: #fff; font-weight: bold; }

        #viewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 25px; border-radius: 16px; }
        #view-body { background: #fff; color: #000; padding: 20px; border-radius: 12px; overflow-y: auto; flex-grow: 1; font-size: 14px; }
        .exit-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .saved-label { font-size: 12px; color: var(--grey); text-transform: uppercase; margin: 20px 0 10px 10px; font-weight: bold; }
        #saved-list { flex-grow: 1; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; }
        .saved-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; border-left: 2px solid var(--blue); }
    </style>
</head>
<body>

    <div id="mod-menu">
        <div class="logo-header">
            <svg class="gmail-logo" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z" fill="none" stroke="var(--blue)" stroke-width="2"/>
                <path d="M20 6l-8 5-8-5" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>VULCAN FRESH</h1>
        </div>

        <div class="address-section">
            <div id="addr-box">
                <div id="addr-display">CONNECTING...</div>
            </div>
            <div class="btn-row">
                <button class="v-btn change-btn" onclick="genNew()">New Mail</button>
                <button class="v-btn copy-btn" onclick="copyAddr()">Copy</button>
            </div>
            <button class="v-btn save-btn" onclick="saveCurrent()">💾 SAVE SESSION</button>
        </div>

        <div id="inbox-bar" onclick="showInbox()">
            <div style="display:flex; align-items:center; gap:12px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--blue)"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg>
                <span style="font-weight:bold; font-size:16px;">Inbox</span>
            </div>
            <div class="inbox-count" id="count">0</div>
        </div>

        <div class="saved-label">Saved Accounts</div>
        <div id="saved-list"></div>

        <div id="viewer">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color:var(--blue);">Messages</h3>
                <button class="exit-btn" onclick="hideViewer()">CLOSE</button>
            </div>
            <div id="view-body">Waiting for mail...</div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let token = "", realMail = "", displayMail = "";
        let saved = JSON.parse(localStorage.getItem('v_pro_save') || "[]");

        async function genNew() {
            document.getElementById('addr-display').innerText = "GENERATING...";
            try {
                const domRes = await fetch(`${API}/domains`);
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                
                const randomUser = "vlc_" + Math.random().toString(36).substring(7);
                realMail = `${randomUser}@${domain}`;
                displayMail = `${randomUser}@gmail.com`; 

                // Create Account
                await fetch(`${API}/accounts`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({address: realMail, password: "password123"}) 
                });

                // Get Token
                const tokRes = await fetch(`${API}/token`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({address: realMail, password: "password123"}) 
                });
                const tokData = await tokRes.json();
                token = tokData.token;
                
                document.getElementById('addr-display').innerText = displayMail;
                renderSaved();
            } catch (e) {
                document.getElementById('addr-display').innerText = "API ERROR - RETRYING...";
                setTimeout(genNew, 3000);
            }
        }

        // Check for mail every 5 seconds
        async function checkInbox() {
            if (!token) return;
            try {
                const res = await fetch(`${API}/messages`, { headers: {'Authorization': `Bearer ${token}`} });
                const data = await res.json();
                document.getElementById('count').innerText = data['hydra:member'].length;
                if (document.getElementById('viewer').style.display === 'flex') {
                    renderInbox(data['hydra:member']);
                }
            } catch (e) { console.log("Inbox check failed"); }
        }

        function renderInbox(messages) {
            const body = document.getElementById('view-body');
            if (body.getAttribute('data-viewing') === 'true') return;
            if (messages.length === 0) {
                body.innerHTML = "<p style='text-align:center; color:#999;'>No messages yet...</p>";
                return;
            }
            body.innerHTML = messages.map(m => `
                <div onclick="readMsg('${m.id}')" style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;">
                    <b style="color:#000;">${m.subject}</b><br>
                    <small style="color:var(--blue);">${m.from.address}</small>
                </div>
            `).join('');
        }

        async function readMsg(id) {
            const res = await fetch(`${API}/messages/${id}`, { headers: {'Authorization': `Bearer ${token}`} });
            const m = await res.json();
            const body = document.getElementById('view-body');
            body.setAttribute('data-viewing', 'true');
            body.innerHTML = `
                <button onclick="backToList()" style="margin-bottom:10px; background:#444; color:white; border:none; padding:10px; border-radius:5px;">← Back</button>
                <h3>${m.subject}</h3>
                <hr>
                <div style="color:#333;">${m.html || m.text}</div>
            `;
        }

        function backToList() {
            document.getElementById('view-body').setAttribute('data-viewing', 'false');
            checkInbox();
        }

        function saveCurrent() {
            if (!token || saved.find(s => s.realMail === realMail)) return;
            saved.push({token, realMail, displayMail});
            localStorage.setItem('v_pro_save', JSON.stringify(saved));
            renderSaved();
        }

        function renderSaved() {
            const list = document.getElementById('saved-list');
            list.innerHTML = saved.map((s, i) => `
                <div class="saved-item">
                    <span onclick="loadSaved(${i})" style="color:var(--blue); cursor:pointer;">${s.displayMail}</span>
                    <span onclick="deleteSession(${i})" style="color:var(--danger); cursor:pointer; font-weight:bold;">X</span>
                </div>
            `).join('');
        }

        function loadSaved(i) {
            const s = saved[i];
            token = s.token; realMail = s.realMail; displayMail = s.displayMail;
            document.getElementById('addr-display').innerText = displayMail;
            hideViewer();
        }

        function deleteSession(i) {
            saved.splice(i, 1);
            localStorage.setItem('v_pro_save', JSON.stringify(saved));
            renderSaved();
        }

        function copyAddr() {
            navigator.clipboard.writeText(realMail);
            alert("Copied Real Address!");
        }

        function showInbox() { document.getElementById('viewer').style.display = 'flex'; checkInbox(); }
        function hideViewer() { document.getElementById('viewer').style.display = 'none'; }

        // STARTUP
        window.onload = () => {
            genNew();
            setInterval(checkInbox, 5000);
        };
    </script>
</body>
</html>

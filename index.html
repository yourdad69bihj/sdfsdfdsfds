<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VULCAN FRESH</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #16181d; --text: #ffffff; --green: #00ff88; --blue: #4285f4; --border: #2a2d35; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #mod-menu {
            width: 100%; max-width: 400px; height: 90vh;
            background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 25px;
            display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,255,136,0.1);
        }

        .logo-header { text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-header h1 { font-size: 20px; text-transform: uppercase; letter-spacing: 2px; margin: 0; color: var(--blue); }

        .box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; }
        #addr-display { 
            background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--green);
            font-size: 13px; color: var(--green); font-weight: bold; margin-bottom: 15px;
            word-break: break-all; min-height: 45px; display: flex; align-items: center; justify-content: center;
        }

        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        .gen-btn { background: var(--blue); color: white; }
        .copy-btn { background: var(--green); color: black; }
        
        #inbox-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; cursor: pointer; }
        .count { background: var(--blue); padding: 2px 10px; border-radius: 5px; font-size: 12px; }

        #viewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; flex-direction: column; padding: 20px; }
        #view-body { background: #fff; color: #000; padding: 15px; border-radius: 10px; overflow-y: auto; flex-grow: 1; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="mod-menu">
        <div class="logo-header">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6" stroke="var(--green)"/></svg>
            <h1>VULCAN FRESH</h1>
        </div>

        <div class="box">
            <div id="addr-display">CLICK GENERATE</div>
            <button class="btn gen-btn" onclick="genNew()">GENERATE NEW</button>
            <button class="btn copy-btn" onclick="copyAddr()">COPY ADDRESS</button>
        </div>

        <div id="inbox-btn" onclick="showInbox()">
            <span>INCOMING STREAM</span>
            <span class="count" id="count">0</span>
        </div>

        <p id="status" style="font-size: 10px; color: #444; text-align: center; margin-top: auto;">System: Idle</p>

        <div id="viewer">
            <button onclick="hideViewer()" style="padding: 10px; background: red; color: white; border: none; border-radius: 5px;">CLOSE X</button>
            <div id="view-body">Waiting for packets...</div>
        </div>
    </div>

    <script>
        let token = "", address = "";
        const proxy = "https://api.allorigins.win/raw?url=";
        const api = "https://api.mail.tm";

        function setStatus(t) { document.getElementById('status').innerText = "System: " + t; }

        async function genNew() {
            setStatus("Fetching Domain...");
            document.getElementById('addr-display').innerText = "LOADING...";
            
            try {
                const domRes = await fetch(proxy + encodeURIComponent(api + "/domains"));
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                
                address = "vlc_" + Math.random().toString(36).substring(7) + "@" + domain;
                const pass = "jordan123";

                setStatus("Creating Account...");
                await fetch(api + "/accounts", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({address, password: pass})
                });

                setStatus("Getting Token...");
                const tokRes = await fetch(api + "/token", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({address, password: pass})
                });
                const tokData = await tokRes.json();
                token = tokData.token;

                document.getElementById('addr-display').innerText = address;
                setStatus("Online");
            } catch (err) {
                setStatus("Error - Click Generate Again");
                document.getElementById('addr-display').innerText = "READY";
            }
        }

        async function checkInbox() {
            if (!token) return;
            try {
                const res = await fetch(api + "/messages", {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                document.getElementById('count').innerText = data['hydra:member'].length;
                if (document.getElementById('viewer').style.display === 'flex') {
                    renderInbox(data['hydra:member']);
                }
            } catch (e) {}
        }

        function renderInbox(msgs) {
            const body = document.getElementById('view-body');
            if (msgs.length === 0) { body.innerHTML = "No mail received yet."; return; }
            body.innerHTML = msgs.map(m => `
                <div style="padding:10px; border-bottom:1px solid #ddd;">
                    <b style="color:#000;">${m.subject}</b><br><small>${m.from.address}</small>
                </div>
            `).join('');
        }

        function copyAddr() {
            if (!address) return;
            navigator.clipboard.writeText(address);
            document.getElementById('status').innerText = "System: Copied!";
        }

        function showInbox() { document.getElementById('viewer').style.display = 'flex'; checkInbox(); }
        function hideViewer() { document.getElementById('viewer').style.display = 'none'; }

        setInterval(checkInbox, 5000);
    </script>
</body>
</html>
